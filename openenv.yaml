spec_version: 1
name: fraud-detect-env
version: "1.0.0"
description: "Bank Fraud Detection Agent - 3-task RL pipeline for Meta PyTorch Hackathon"
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: classify
    name: classify_transaction
    description: "Classify a bank transaction as FRAUD or LEGIT"
    difficulty: easy
    max_steps: 1
    grader:
      type: exact_match
      key: classification.verdict

  - id: identify_type
    name: identify_fraud_type
    description: "Identify the specific type of fraud"
    difficulty: medium
    max_steps: 1
    grader:
      type: contains
      key: fraud_type

  - id: action_plan
    name: generate_action_plan
    description: "Generate a structured fraud mitigation action plan"
    difficulty: hard
    max_steps: 1
    grader:
      type: keyword
      keywords:
        - RISK LEVEL
        - RECOMMENDED ACTION
        - NEXT STEPS
        - DO NOT