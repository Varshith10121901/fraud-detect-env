name: fraud-detect-env
version: "1.0.0"
description: >
  Bank Fraud Detection Agent — AI-powered 3-task pipeline
  (Classify → Identify Type → Action Plan) using Qwen2.5-72B via HuggingFace.

runtime:
  python: "3.11"
  entrypoint: "server/app.py"

model:
  provider: huggingface
  name: ${MODEL_NAME}
  api_base: ${API_BASE_URL}
  auth_token_env: HF_TOKEN
  parameters:
    temperature: 0.1
    max_tokens: 512

environment:
  variables:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN

tasks:
  - name: classify
    description: "TASK 1 — Classify transaction as FRAUD or LEGIT"
    output: single_word

  - name: identify_type
    description: "TASK 2 — Identify fraud type (5 categories)"
    depends_on: classify
    condition: "classify.output == 'FRAUD'"
    output: single_label

  - name: action_plan
    description: "TASK 3 — Generate complete remediation action plan"
    depends_on: identify_type
    output: structured_plan

server:
  framework: fastapi
  host: "0.0.0.0"
  port: 7860
  endpoints:
    - path: /
      method: GET
      description: Interactive dashboard UI
    - path: /health
      method: GET
      description: Health check
    - path: /transactions
      method: GET
      description: List sample transactions
    - path: /analyse
      method: POST
      description: Analyse a single transaction
    - path: /analyse/batch
      method: POST
      description: Analyse all sample transactions
    - path: /analyse/{txn_id}
      method: POST
      description: Analyse by transaction ID
