spec_version: 1
name: fraud-detect-env
version: "1.0.0"
description: "Bank Fraud Detection Agent - 3-task RL pipeline"
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: classify
    name: "Classify Transaction"
    description: "Classify a transaction as FRAUD or LEGIT"
    difficulty: easy
    max_steps: 2
    reward_range: [0.0, 1.0]

  - id: identify_type
    name: "Identify Fraud Type"
    description: "Identify the type of fraud"
    difficulty: medium
    max_steps: 2
    reward_range: [0.0, 1.0]

  - id: action_plan
    name: "Generate Action Plan"
    description: "Generate a structured fraud mitigation action plan"
    difficulty: hard
    max_steps: 2
    reward_range: [0.0, 1.0]

reward:
  min: 0.0
  max: 1.0
  description: "Reward based on task accuracy and response quality"

endpoints:
  health: GET /health
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks