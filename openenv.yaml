spec_version: 1
name: fraud-detect-env
version: "1.0.0"
description: "Bank Fraud Detection Agent - 3-task RL pipeline"
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - name: classify
    description: "Classify a transaction as FRAUD or LEGIT"
    grader:
      type: reward_based
      reward_range: [0.01, 0.99]

  - name: identify_type
    description: "Identify the type of fraud"
    grader:
      type: reward_based
      reward_range: [0.01, 0.99]

  - name: action_plan
    description: "Generate a structured fraud mitigation action plan"
    grader:
      type: reward_based
      reward_range: [0.05, 0.85]
