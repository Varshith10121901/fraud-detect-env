spec_version: 1
name: fraud-detect-env
version: "1.0.0"
description: "Bank Fraud Detection Agent - 3-task RL pipeline"
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: classify
    name: "Classify Transaction"
    description: "Classify a bank transaction as FRAUD or LEGIT"
    difficulty: easy
    max_steps: 1
    reward_range: [0.01, 0.99]

  - id: identify_type
    name: "Identify Fraud Type"
    description: "Identify the specific type of fraud"
    difficulty: medium
    max_steps: 1
    reward_range: [0.01, 0.99]

  - id: action_plan
    name: "Generate Action Plan"
    description: "Generate a structured fraud mitigation action plan"
    difficulty: hard
    max_steps: 1
    reward_range: [0.05, 0.85]
